<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Contacts Page</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.min.js' %}"></script>
</head>
<body>
    <h1 class = "text-center">Contacts</h1>
    <p>Below is a list of all contacts, including their details and information</p>
    <table class = "table table-striped table-hover">

            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Subjects</th>
                <th>Message</th>
                <th>Action</th>
            </tr>

        {% for contact in all %}
        <tr>

            <td>{{ contact.name }}</td>
            <td>{{ contact.email }}</td>
            <td>{{ contact.subjects }}</td>
            <td>{{ contact.message }}</td>
            <td>
                <button type="button" class="btn btn-success edit-btn" 
                    data-id="{{ contact.id }}"
                    data-name="{{ contact.name|escapejs }}"
                    data-email="{{ contact.email|escapejs }}"
                    data-subject="{{ contact.subjects|escapejs }}"
                    data-message="{{ contact.message|escapejs }}"
                    data-bs-toggle="modal" data-bs-target="#editModal">
                    Edit
                </button>
                <a href="/delete/{{ contact.id }}/" class="btn btn-danger">Delete</a>
            </td>

        
        </tr>
       {% endfor %}
                </table>

        <!-- Edit Modal -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Contact</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form method="post" id="editForm">
                        {% csrf_token %}
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="modal-name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="modal-name" name="name">
                            </div>
                            <div class="mb-3">
                                <label for="modal-email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="modal-email" name="email">
                            </div>
                            <div class="mb-3">
                                <label for="modal-subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="modal-subject" name="subject">
                            </div>
                            <div class="mb-3">
                                <label for="modal-message" class="form-label">Message</label>
                                <textarea class="form-control" id="modal-message" name="message"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary">Save changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
        document.addEventListener('DOMContentLoaded', function () {
            var editModal = document.getElementById('editModal');
            var editForm = document.getElementById('editForm');
            var nameInput = document.getElementById('modal-name');
            var emailInput = document.getElementById('modal-email');
            var subjectInput = document.getElementById('modal-subject');
            var messageInput = document.getElementById('modal-message');

            document.querySelectorAll('.edit-btn').forEach(function(btn) {
                btn.addEventListener('click', function () {
                    var id = this.getAttribute('data-id');
                    nameInput.value = this.getAttribute('data-name');
                    emailInput.value = this.getAttribute('data-email');
                    subjectInput.value = this.getAttribute('data-subject');
                    messageInput.value = this.getAttribute('data-message');
                    editForm.action = '/edit/' + id + '/';
                });
            });
        });
        </script>

</body>
</html>
